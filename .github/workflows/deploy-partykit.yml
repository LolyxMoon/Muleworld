name: Deploy PartyKit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: |
          mkdir -p ~/.partykit
          echo '{"login":"${{ secrets.PARTYKIT_LOGIN }}","access_token":"${{ secrets.PARTYKIT_TOKEN }}"}' > ~/.partykit/config.json
          npx partykit deploy party/server.js --name mulerun-world
