name: Deploy PartyKit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: |
          mkdir -p ~/.partykit
          echo '{"login":"lolyxmoon","access_token":"${{ secrets.PARTYKIT_TOKEN }}","type":"clerk","username":"lolyxmoon","team":"lolyxmoon"}' > ~/.partykit/config.json
          cat ~/.partykit/config.json
          npx partykit deploy party/server.js --name mulerun-world
